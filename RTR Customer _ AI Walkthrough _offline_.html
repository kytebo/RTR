 var(--dur) var(--ease);}\n.subrow .demo-chip{\n  flex:0 0 auto;display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600;letter-spacing:.04em;\n  color:#fff;background:var(--lava);padding:5px 11px;border-radius:999px;\n}\n\n/* new revenue group */\n.nr-divider{display:flex;align-items:center;gap:18px;margin:26px 0 16px;}\n.nr-divider .ln{flex:1;height:1px;background:var(--lava-line);}\n.nr-divider .lbl{display:flex;align-items:center;gap:9px;font-family:var(--font-serif);font-size:clamp(20px,1.7vw,26px);color:var(--burghundy);}\n.nr-divider .star{color:var(--lava);}\n.nr-note{font-size:14px;line-height:1.5;color:var(--charcoal-50);max-width:80ch;margin:-4px 0 16px;}\n.subrow.nr{background:linear-gradient(180deg,#fff,#fff);border-color:var(--lava-line);}\n.subrow.nr .code{color:var(--burghundy);}\n.subrow.nr .nm{display:flex;flex-direction:column;gap:3px;}\n.subrow.nr .nm .badge{font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--lava);}\n\n/* pause banner */\n.pause{\n  display:flex;align-items:center;gap:20px;margin-top:22px;flex:0 0 auto;\n  background:var(--burghundy);color:var(--sand);border-radius:14px;padding:20px 28px;\n}\n.pause .ic{\n  flex:0 0 auto;width:42px;height:42px;border-radius:50%;border:1.5px solid var(--lava);\n  display:flex;align-items:center;justify-content:center;color:var(--lava);font-size:18px;\n}\n.pause .ptxt strong{display:block;font-family:var(--font-serif);font-weight:400;font-size:22px;letter-spacing:-.01em;margin-bottom:2px;}\n.pause .ptxt span{font-size:14px;color:var(--on-dark-dim);letter-spacing:.02em;}\n\n/* ----- Level 3 detail ----- */\n.l3{display:flex;flex-direction:column;height:100%;overflow:hidden;}\n.l3-head{flex:0 0 auto;margin-bottom:16px;display:flex;align-items:flex-start;gap:18px;}\n.l3-head .code{font-family:var(--font-serif);font-size:clamp(26px,2.4vw,40px);color:var(--lava);line-height:1;flex:0 0 auto;}\n.l3-head h2{font-family:var(--font-serif);font-weight:400;font-size:clamp(28px,3vw,48px);line-height:1.04;letter-spacing:-.015em;margin:0;}\n.l3-head .badge{\n  display:inline-block;margin-bottom:8px;font-size:11px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;\n  color:#fff;background:var(--lava);padding:5px 12px;border-radius:999px;\n}\n.l3-scroll{flex:1 1 auto;min-height:0;overflow-y:auto;padding-right:12px;margin-right:-12px;}\n.l3-summary{font-size:clamp(18px,1.5vw,22px);line-height:1.5;color:var(--charcoal);max-width:74ch;margin:0 0 24px;}\n.usecases{list-style:none;margin:0;padding:0;max-width:90ch;}\n.usecases li{\n  position:relative;padding:14px 0 14px 30px;font-size:clamp(16px,1.3vw,19px);line-height:1.5;\n  color:var(--charcoal);border-bottom:1px solid var(--ink-06);\n}\n.usecases li::before{content:\"\";position:absolute;left:4px;top:23px;width:8px;height:8px;border-radius:50%;background:var(--lava);}\n.usecases li b{font-weight:600;}\n.usecases li em{font-style:normal;color:var(--charcoal-40);}\n\n.nr-blocks{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin:26px 0 8px;}\n@media(max-width:1000px){.nr-blocks{grid-template-columns:1fr;}}\n.nr-block{background:var(--sand-30);border:1px solid var(--ink-06);border-radius:12px;padding:20px 22px;}\n.nr-block h4{font-size:12px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--lava);margin:0 0 12px;}\n.nr-block p{font-size:15px;line-height:1.55;color:var(--charcoal);margin:0;}\n\n/* demo launch */\n.demo-launch{\n  display:flex;flex-wrap:wrap;align-items:center;gap:22px;\n  background:var(--charcoal);color:var(--sand);border-radius:14px;padding:24px 28px;margin:8px 0 24px;\n}\n.demo-launch .dl-txt{flex:1 1 280px;}\n.demo-launch .dl-txt strong{display:block;font-family:var(--font-serif);font-weight:400;font-size:24px;letter-spacing:-.01em;margin-bottom:5px;}\n.demo-launch .dl-txt span{font-size:14px;color:var(--on-dark-dim);line-height:1.5;}\n.demo-btn{\n  display:inline-flex;align-items:center;gap:12px;flex:0 0 auto;\n  background:var(--lava);color:#fff;border:0;cursor:pointer;text-decoration:none;\n  font-family:var(--font-sans);font-size:17px;font-weight:600;letter-spacing:.02em;\n  padding:16px 26px;border-radius:999px;\n  transition:transform var(--dur-q) var(--ease),background var(--dur) var(--ease);\n}\n.demo-btn:hover{background:#fff;color:var(--charcoal);}\n.demo-btn:active{transform:translateY(1px);}\n.demo-btn .play{font-size:14px;}\n\n/* TODO chips */\n.todo{\n  display:inline-flex;align-items:center;gap:8px;\n  font-size:12px;font-weight:500;letter-spacing:.04em;color:var(--charcoal-40);\n  background:repeating-linear-gradient(45deg,var(--sand-30),var(--sand-30) 8px,var(--sand-50) 8px,var(--sand-50) 16px);\n  border:1px dashed var(--ink-30);border-radius:8px;padding:8px 13px;line-height:1.35;\n}\n.todo .tag{font-size:10px;font-weight:700;letter-spacing:.1em;color:var(--lava);text-transform:uppercase;}\n.todo--dark{background:rgba(234,232,223,0.06);border-color:var(--border-dark);color:var(--on-dark-dim);}\n.todo-row{display:flex;flex-wrap:wrap;gap:10px;margin-top:18px;}\n\n/* ====================== DISCUSSION (Section C) ====================== */\n.disc-intro h2{font-family:var(--font-serif);font-weight:400;font-size:clamp(40px,5.2vw,80px);line-height:1.06;letter-spacing:-.015em;margin:0;max-width:18ch;}\n.disc-intro h2 em{font-style:italic;color:var(--lava);}\n.disc-intro .lede{font-size:clamp(18px,1.6vw,23px);line-height:1.55;color:var(--on-dark-dim);max-width:58ch;margin:30px 0 0;}\n.disc-toggle{display:inline-flex;align-items:center;gap:14px;margin-top:40px;}\n.disc-toggle .lbl{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--on-dark-dim);}\n.seg{display:inline-flex;background:rgba(234,232,223,0.08);border:1px solid var(--border-dark);border-radius:999px;padding:3px;}\n.seg button{font-family:var(--font-sans);font-size:12px;font-weight:500;letter-spacing:.04em;color:var(--on-dark-dim);background:none;border:0;cursor:pointer;padding:9px 18px;border-radius:999px;transition:background var(--dur) var(--ease),color var(--dur) var(--ease);}\n.seg button:hover{color:var(--sand);}\n.seg button.on{background:var(--sand);color:var(--charcoal);}\n.seg button.on:hover{color:var(--charcoal);}\n\n/* combined: all questions on one page */\n.qa-all{display:none;align-items:center;}\nbody.disc-all .qa-single{display:none !important;}\nbody.disc-all .qa-all{display:flex;}\n.qa-all .wrap{max-width:1180px;}\n.qa-all .eyebrow{margin-bottom:16px;}\n.qa-all-h{font-family:var(--font-serif);font-weight:400;font-size:clamp(32px,3.6vw,56px);line-height:1.04;letter-spacing:-.015em;margin:0;}\n.qa-list{list-style:none;margin:34px 0 0;padding:0;display:grid;grid-template-columns:1fr 1fr;gap:26px 48px;}\n.qa-list li{display:flex;gap:18px;}\n.qa-list li:last-child{grid-column:1 / -1;max-width:calc(50% - 24px);}\n.qa-list .n{font-family:var(--font-serif);font-size:28px;color:var(--lava);line-height:1;flex:0 0 auto;}\n.qa-list h3{font-family:var(--font-serif);font-weight:400;font-size:clamp(20px,1.6vw,26px);line-height:1.12;letter-spacing:-.01em;margin:0 0 9px;}\n.qa-list p{font-size:clamp(14px,1.05vw,16.5px);line-height:1.5;color:var(--charcoal-50);margin:0;text-wrap:pretty;}\n@media(max-width:920px){.qa-list{grid-template-columns:1fr;}.qa-list li:last-child{grid-column:auto;max-width:none;}}\n.qa .qmeta{display:flex;align-items:baseline;gap:18px;margin-bottom:24px;}\n.qa .qnum{font-family:var(--font-serif);font-size:clamp(34px,4vw,64px);color:var(--lava);line-height:1;}\n.qa .qof{font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:var(--charcoal-30);}\n.qa h2{font-family:var(--font-serif);font-weight:400;font-size:clamp(30px,3.4vw,54px);line-height:1.06;letter-spacing:-.015em;margin:0;max-width:20ch;}\n.qa .body{font-size:clamp(17px,1.55vw,22px);line-height:1.6;color:var(--charcoal-50);max-width:64ch;margin:28px 0 0;}\n\n/* closing */\n.closing{align-items:center;text-align:center;}\n.closing .qr-sign{height:30px;margin-bottom:40px;opacity:.9;}\n.closing h2{font-family:var(--font-serif);font-weight:400;font-style:italic;font-size:clamp(40px,5.4vw,84px);line-height:1.05;margin:0;color:var(--on-dark);}\n.closing .ln{width:64px;height:3px;background:var(--lava);margin:34px auto 0;}\n.closing .sub{margin-top:30px;font-size:14px;letter-spacing:.14em;text-transform:uppercase;color:var(--on-dark-dim);}\n\n/* arrow nav buttons (bottom-right, outside content) */\n.pager{position:fixed;right:clamp(20px,3vw,40px);bottom:26px;z-index:60;display:flex;gap:10px;}\n.pager button{\n  width:50px;height:50px;border-radius:50%;border:1px solid var(--ink-10);background:var(--white);\n  color:var(--charcoal);cursor:pointer;font-size:20px;display:flex;align-items:center;justify-content:center;\n  box-shadow:0 4px 14px rgba(30,30,30,0.1);transition:background var(--dur) var(--ease),color var(--dur) var(--ease),transform var(--dur-q) var(--ease);\n}\n.pager button:hover{background:var(--charcoal);color:var(--sand);}\n.pager button:active{transform:translateY(1px);}\n.pager button:disabled{opacity:.35;cursor:default;}\n.pager.on-dark button{background:rgba(234,232,223,0.1);border-color:var(--border-dark);color:var(--on-dark);}\n.pager.on-dark button:hover{background:var(--sand);color:var(--charcoal);}\n\n@media(max-width:760px){\n  .l1-body{grid-template-columns:1fr;grid-template-rows:none;display:flex;flex-direction:column;overflow-y:auto;}\n  .ax-row,.l1-axis-top{display:none;}\n  .subgrid{grid-template-columns:1fr;}\n  .pause{flex-wrap:wrap;}\n}\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<div class=\"prog\" id=\"prog\"><\u002Fdiv>\n\n<!-- ===== Top bar ===== -->\n<header class=\"topbar\" id=\"topbar\">\n  <div class=\"brandmark\">\n    <img src=\"5519c200-b772-43dd-bf42-1982451593a2\" alt=\"Quantum Rise\">\n    <span class=\"sep\"><\u002Fspan>\n    <span class=\"ctx\">Rent the Runway · Customer &amp; AI<\u002Fspan>\n  <\u002Fdiv>\n  <nav class=\"navlinks\" id=\"navlinks\">\n    <button data-go=\"1\">Observations<\u002Fbutton>\n    <button data-go=\"7\">Framework<\u002Fbutton>\n    <button data-go=\"8\">Discussion<\u002Fbutton>\n  <\u002Fnav>\n<\u002Fheader>\n\n<!-- ===== Deck ===== -->\n<main class=\"deck\" id=\"deck\">\n\n  <!-- 0 · Cover -->\n  <section class=\"panel panel--dark cover\" data-section=\"obs\" data-screen-label=\"Cover\">\n    <div class=\"wrap\">\n      <p class=\"kicker reveal\">Leadership Working Session · June 3, 2026<\u002Fp>\n      <h1 class=\"reveal d1\">Think bigger about what AI makes <em>possible<\u002Fem>.<\u002Fh1>\n      <p class=\"lede reveal d2\">A working map of how AI will continue to reshape the customer and the retailers who serve her.&nbsp; &nbsp;Built to stimulate big &amp; bold thinking around growth potential for Rent the Runway.<\u002Fp>\n      <div class=\"meta reveal d3\">\n        <span>Customer &amp; AI Enablement<\u002Fspan><span class=\"dot\"><\u002Fspan>\n        <span>Prepared by Quantum Rise for Rent the Runway<\u002Fspan><span class=\"dot\" style=\"background-color: rgb(24, 25, 52)\"><\u002Fspan>\n        <span>\n<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"hint reveal d3\">Scroll, or press <span class=\"arrow\">↓<\u002Fspan> to begin<\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 1–5 · Observations -->\n  <section class=\"panel obs\" data-section=\"obs\" data-screen-label=\"Observation 01\">\n    <div class=\"wrap\">\n      <div class=\"rule reveal\"><\u002Fdiv>\n      <div class=\"lead reveal\"><span class=\"num\">01<\u002Fspan><span class=\"of\">OBSERVATION&nbsp;<\u002Fspan><\u002Fdiv>\n      <h2 class=\"reveal d1\">The customer is already ahead of most retailers.<\u002Fh2>\n      <p class=\"support reveal d2\">Agentic checkout, AI shopping assistants, and generative try-on aren't speculative, they shipped in late 2025 and early 2026. What counts as \"today\" for her is already past where most retail plans assume.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section class=\"panel obs\" data-section=\"obs\" data-screen-label=\"Observation 02\">\n    <div class=\"wrap\">\n      <div class=\"rule reveal\"><\u002Fdiv>\n      <div class=\"lead reveal\"><span class=\"num\">02<\u002Fspan><span class=\"of\">Observation<\u002Fspan><\u002Fdiv>\n      <h2 class=\"reveal d1\">Gen Z and Gen Alpha don't search, they <em>ask<\u002Fem>.<\u002Fh2>\n      <p class=\"support reveal d2\">They're the first cohorts for whom conversational AI is the default way to find things. Optimizing for the keyword search bar is optimizing for the parents of your future customers.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section class=\"panel obs\" data-section=\"obs\" data-screen-label=\"Observation 03\">\n    <div class=\"wrap\">\n      <div class=\"rule reveal\"><\u002Fdiv>\n      <div class=\"lead reveal\"><span class=\"num\">03<\u002Fspan><span class=\"of\">Observation<\u002Fspan><\u002Fdiv>\n      <h2 class=\"reveal d1\">A big open decision is how she will <em>reach<\u002Fem> you.<\u002Fh2>\n      <p class=\"support reveal d2\">Some retailers will go proprietary and build their own shopping agent; others will go open and sell through hers. If they build their own, is it in a closed loop or open ecosystem available to other retailers and brands? Every apparel retailer has to choose: sell through her agent, build your own, or both; and most haven't yet declared a decision.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section class=\"panel obs\" data-section=\"obs\" data-screen-label=\"Observation 04\">\n    <div class=\"wrap\">\n      <div class=\"rule reveal\"><\u002Fdiv>\n      <div class=\"lead reveal\"><span class=\"num\">04<\u002Fspan><span class=\"of\">Observation<\u002Fspan><\u002Fdiv>\n      <h2 class=\"reveal d1\">Your job is shifting from owning the experience to being <em>eligible<\u002Fem> for it.<\u002Fh2>\n      <p class=\"support reveal d2\">Today the retailer interacts directly and owns the surface, the site, the app, the email. Tomorrow there is a new intermediary: the customer may bring her own agent, closet model, and fit profile, and the retailer's job is to be the answer her agent reaches for, unless you can be a go-to place to build her agent.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section class=\"panel obs\" data-section=\"obs\" data-screen-label=\"Observation 05\">\n    <div class=\"wrap\">\n      <div class=\"rule reveal\"><\u002Fdiv>\n      <div class=\"lead reveal\"><span class=\"num\">05<\u002Fspan><span class=\"of\">OBSERVATION&nbsp;<\u002Fspan><\u002Fdiv>\n      <h2 class=\"reveal d1\">\"AI in the business\" and \"AI as a business\" are two different <em>conversations<\u002Fem>.<\u002Fh2>\n      <p class=\"support reveal d2\">One applies AI to the existing business, better conversion, retention, lower cost to serve. The other is net-new revenue, where AI is inherent in the product she pays for. AI can be treated as a growth bet that supports putting the customer at the center of your priorities.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 6 · Transition -->\n  <section class=\"panel panel--dark trans\" data-section=\"obs\" data-screen-label=\"Transition\">\n    <div class=\"wrap\">\n      <p class=\"eyebrow reveal\">From observation to framework<\u002Fp>\n      <h2 class=\"reveal d1\">Let's get <em>specific<\u002Fem>.<\u002Fh2>\n      <button class=\"go reveal d2\" data-go=\"7\">Open the framework <span class=\"ar\">→<\u002Fspan><\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 7 · Framework (interactive) -->\n  <section class=\"panel\" id=\"framework\" data-section=\"framework\" data-screen-label=\"The 2×2 framework\">\n    <div class=\"fw\">\n      <div class=\"fw-bar\">\n        <div class=\"fw-crumb\" id=\"fwCrumb\"><\u002Fdiv>\n        <div class=\"fw-tools\" id=\"fwTools\">\n          <span class=\"layout-lbl\">Home layout<\u002Fspan>\n          <div class=\"layout-toggle\" id=\"layoutToggle\">\n            <button data-layout=\"grid\" class=\"on\">2×2 grid<\u002Fbutton>\n            <button data-layout=\"cards\">Stacked<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"fw-stage\" id=\"fwStage\"><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 8 · Discussion intro -->\n  <section class=\"panel panel--dark disc-intro\" data-section=\"discussion\" data-screen-label=\"Discussion · intro\">\n    <div class=\"wrap\">\n      <p class=\"eyebrow reveal\">To close · open discussion<\u002Fp>\n      <h2 class=\"reveal d1\">Take off the constraints of who you are <em>today<\u002Fem>.<\u002Fh2>\n      <p class=\"lede reveal d2\">Five open questions, not to answer on the spot, but to provoke the bigger thinking we carry into the offsite.<\u002Fp>\n      <div class=\"disc-toggle reveal d3\">\n        <span class=\"lbl\">Show as<\u002Fspan>\n        <div class=\"seg\" id=\"discToggle\">\n          <button data-disc=\"single\" class=\"on\">One per screen<\u002Fbutton>\n          <button data-disc=\"all\">All on one page<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 9–13 · Discussion questions -->\n  <section class=\"panel qa qa-single\" data-section=\"discussion\" data-screen-label=\"Discussion Q1\">\n    <div class=\"wrap\">\n      <div class=\"qmeta reveal\"><span class=\"qnum\">01<\u002Fspan><span class=\"qof\">How she discovers and decides<\u002Fspan><\u002Fdiv>\n      <h2 class=\"reveal d1\">Three years from now, how will she find what she wants to wear?<\u002Fh2>\n      <p class=\"body reveal d2\">As AI agents move from search results to actual recommendations, and eventually to shopping on her behalf, how does the moment of discovery and decision change? What replaces browsing, scrolling, and the brand search bar?<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section class=\"panel qa qa-single\" data-section=\"discussion\" data-screen-label=\"Discussion Q2\">\n    <div class=\"wrap\">\n      <div class=\"qmeta reveal\"><span class=\"qnum\">02<\u002Fspan><span class=\"qof\">What \"personalization\" comes to mean<\u002Fspan><\u002Fdiv>\n      <h2 class=\"reveal d1\">When her AI knows her better than she knows herself, what does personalization feel like?<\u002Fh2>\n      <p class=\"body reveal d2\">Today personalization is mostly inferred from clicks and past purchases. Once she has an AI that knows her body, her calendar, her style, and her closet, what becomes the new baseline, and what does she stop accepting as \"personal\"?<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section class=\"panel qa qa-single\" data-section=\"discussion\" data-screen-label=\"Discussion Q3\">\n    <div class=\"wrap\">\n      <div class=\"qmeta reveal\"><span class=\"qnum\">03<\u002Fspan><span class=\"qof\">What she will demand, and no longer tolerate<\u002Fspan><\u002Fdiv>\n      <h2 class=\"reveal d1\">In 12 to 24 months, what new expectations will she carry into every interaction?<\u002Fh2>\n      <p class=\"body reveal d2\">Speed, fit, transparency, service, sustainability, the quality of a recommendation, which of today's frictions become deal-breakers? What does she expect a retail experience to feel like that she didn't expect three years ago?<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section class=\"panel qa qa-single\" data-section=\"discussion\" data-screen-label=\"Discussion Q4\">\n    <div class=\"wrap\">\n      <div class=\"qmeta reveal\"><span class=\"qnum\">04<\u002Fspan><span class=\"qof\">The experiences she will pay for that don't yet exist<\u002Fspan><\u002Fdiv>\n      <h2 class=\"reveal d1\">What will she want, and pay for, in two years that no one offers her today?<\u002Fh2>\n      <p class=\"body reveal d2\">Where in her life with clothing, getting dressed, planning, self-expression, does she still feel underserved? And how will AI change what she believes is possible?<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section class=\"panel qa qa-single\" data-section=\"discussion\" data-screen-label=\"Discussion Q5\">\n    <div class=\"wrap\">\n      <div class=\"qmeta reveal\"><span class=\"qnum\">05<\u002Fspan><span class=\"qof\">How she talks about brands, and how she finds them<\u002Fspan><\u002Fdiv>\n      <h2 class=\"reveal d1\">Two years from now, what does it sound like when she describes a brand to her AI?<\u002Fh2>\n      <p class=\"body reveal d2\">Gen Z and Gen Alpha don't search, they ask. When she describes a brand to a friend, or to her AI, what earns a brand a mention in the answer, and what gets a brand left out of it entirely?<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 14 · Discussion, all on one page (toggled) -->\n  <section class=\"panel qa-all\" data-section=\"discussion\" data-screen-label=\"Discussion · all on one page\">\n    <div class=\"wrap\">\n      <p class=\"eyebrow reveal\">To close · open discussion<\u002Fp>\n      <h2 class=\"qa-all-h reveal d1\">Five questions to open the room.<\u002Fh2>\n      <ol class=\"qa-list reveal d2\">\n        <li><span class=\"n\">01<\u002Fspan><div><h3>How will she find what she wants to wear?<\u002Fh3><p>As AI agents move from search results to recommendations, and eventually to shopping on her behalf, how does discovery and decision change? What replaces browsing, scrolling, and the brand search bar?<\u002Fp><\u002Fdiv><\u002Fli>\n        <li><span class=\"n\">02<\u002Fspan><div><h3>What does personalization come to mean?<\u002Fh3><p>When she has an AI that knows her body, her calendar, her style, and her closet better than she does, what becomes the new baseline, and what does she stop accepting as \"personal\"?<\u002Fp><\u002Fdiv><\u002Fli>\n        <li><span class=\"n\">03<\u002Fspan><div><h3>What will she demand, and no longer tolerate?<\u002Fh3><p>In 12–24 months, speed, fit, transparency, service, sustainability, recommendation quality, which of today's frictions become deal-breakers? What does she now expect a retail experience to feel like?<\u002Fp><\u002Fdiv><\u002Fli>\n        <li><span class=\"n\">04<\u002Fspan><div><h3>What will she pay for that doesn't yet exist?<\u002Fh3><p>Where in her life with clothing, getting dressed, planning, self-expression, does she still feel underserved, and how will AI change what she believes is possible?<\u002Fp><\u002Fdiv><\u002Fli>\n        <li><span class=\"n\">05<\u002Fspan><div><h3>How does she talk about brands, and find them?<\u002Fh3><p>Gen Z and Gen Alpha don't search, they ask. When she describes a brand to a friend or to her AI, what earns a brand a mention in the answer, and what gets it left out entirely?<\u002Fp><\u002Fdiv><\u002Fli>\n      <\u002Fol>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 15 · Closing -->\n  <section class=\"panel panel--char closing\" data-section=\"discussion\" data-screen-label=\"Closing\">\n    <div class=\"wrap\">\n      <h2 class=\"reveal d1\">AI, made <em>real<\u002Fem>.<\u002Fh2>\n      <div class=\"ln reveal d2\"><\u002Fdiv>\n      <p class=\"sub reveal d2\">Quantum Rise · Prepared for Rent the Runway · June 3, 2026<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n<\u002Fmain>\n\n<!-- arrow pager -->\n<div class=\"pager\" id=\"pager\">\n  <button id=\"prev\" aria-label=\"Previous\">↑<\u002Fbutton>\n  <button id=\"next\" aria-label=\"Next\">↓<\u002Fbutton>\n<\u002Fdiv>\n\n<script id=\"fwdata\">\nconst FW = {\n  order:[\"q1\",\"q2\",\"q3\",\"q4\"],\n\n  q1:{\n    code:\"Q1\", col:\"Current\", row:\"Customer experience\", tag:\"Customer-facing · Current\",\n    title:\"What she does today\",\n    blurb:`The AI-enabled behaviors already part of how she shops, styles, and decides. Most are several years into adoption and are now table stakes for any apparel retailer that wants to compete.`,\n    subs:[\n      {code:\"1a\", name:\"Discovery & inspiration\", items:[\n        `Visual search, \"find me something like this Pinterest pin\" as a native shopping mode`,\n        `Aesthetic-driven algorithmic feeds (Pinterest, Instagram Shop, TikTok For You) tuned to her style`,\n        `Basic recommendation engines (\"you might also like,\" \"recommended for you\")`,\n        `Style quizzes that bootstrap a profile (Stitch Fix's 15-year head start; RTR; Nuuly)`\n      ]},\n      {code:\"1b\", name:\"Decisioning & fit\", items:[\n        `Basic virtual try-on, Google Shopping \"Try It On\", Walmart Be Your Own Model (built on Zeekit), Amazon shoes; Sephora and Warby Parker as adjacent precedents`,\n        `AI-summarized reviews and Q&A on PDPs (Amazon, RTR; now expected on any high-volume PDP)`,\n        `Size and fit recommendation engines (True Fit, Fit Analytics, Bold Metrics)`,\n        `Review-sentiment summaries (\"is this worth it?\", \"runs large or small?\")`\n      ]},\n      {code:\"1c\", name:\"Styling & curation\", items:[\n        `Outfit recommendations and \"complete the look\" modules on PDP`,\n        `Editorialized collections surfaced algorithmically by occasion, season, or aesthetic`,\n        `Personalized outfit imagery, Stitch Fix Vision generates her in shoppable head-to-toe outfits; 75% of users return monthly and Freestyle purchases lift 100%+ over 90 days`,\n        `Stitch Fix AI Style Assistant, a conversational tool that helps clients articulate what they're looking for before a Fix`\n      ]},\n      {code:\"1d\", name:\"Conversational shopping\", items:[\n        `Third-party AI assistants, ChatGPT Instant Checkout (live Feb 2026 with Etsy, Glossier, SKIMS, Spanx, Vuori, Target; ~50M shopping queries per day at launch)`,\n        `Alexa for Shopping, launched May 13, 2026, unifying Rufus (300M users in 2025) with Alexa+`,\n        `Perplexity shopping, Gemini-mediated browsing, Microsoft Copilot`,\n        `Retailer-hosted conversational AI, Macy's \"Ask Macy's\" delivering 4.75x spending lift among users`,\n        `Precedent from adjacent categories: Starbucks letting customers discover drinks and start orders inside ChatGPT`\n      ]},\n      {code:\"1e\", name:\"Live & shoppable video commerce\", items:[\n        `TikTok Shop creator-led shoppable videos, projected US$23B GMV in 2026; ~58% of TikTok users have purchased via the platform`,\n        `Instagram Shop and live shopping experiences with product tagging in-video`,\n        `Amazon Live and creator-led livestreams driving fashion conversion`,\n        `Outfit-of-the-day creator content with tap-to-shop in feed`\n      ]},\n      {code:\"1f\", name:\"Post-purchase relationship\", items:[\n        `Personalized re-engagement, email, push, and in-app messages tuned to behavior`,\n        `Care instructions and styling tips delivered post-purchase`,\n        `Returns-prediction prompts and \"how did it fit?\" feedback loops`\n      ]}\n    ]\n  },\n\n  q2:{\n    code:\"Q2\", col:\"Future / emerging\", row:\"Customer experience\", tag:\"Customer-facing · Future / emerging\",\n    title:\"Where she's going\",\n    blurb:`The customer's side is moving faster than the retailer's. Several of these are already in beta or shipped, not speculative, but most consumers are 12 to 36 months from making them the default.`,\n    subs:[\n      {code:\"2a\", name:\"Agentic discovery & autonomous shopping\", items:[\n        `Her shopping agent doing discovery, comparison, and purchase across retailers, not tied to any one site`,\n        `Cross-retailer agents working from her brief, not the retailer's catalog (ChatGPT, Alexa for Shopping, Perplexity, Gemini, Klarna)`,\n        `Agent-to-agent commerce, her agent negotiating with the retailer's agent over price, delivery, substitutions`,\n        `Subscription, replenishment, and re-rental decisions delegated entirely to the agent`,\n        `The structural shift: the retailer no longer owns the shopping surface`\n      ]},\n      {code:\"2b\", name:\"Identity-led conversational discovery\", items:[\n        `Aesthetic-led shopping (\"quiet luxury,\" \"coastal grandmother,\" \"office siren\") replacing category navigation`,\n        `Natural-language briefs returning multi-item curation: \"destination wedding in Italy, I'm 5'4\", here's what's in my closet\"`,\n        `An agent that knows her body, her calendar, her closet, her budget, her returns, and the styles her friends and creators wear`,\n        `RTR has explicitly called this out as a 2026 build; the new search algorithm shipped Feb 2026 is the first step`\n      ]},\n      {code:\"2c\", name:\"Generative virtual try-on & visualization\", items:[\n        `Full-body, in-motion, occasion-aware visualization, \"how does this look at dinner, when I sit down, under that lighting\"`,\n        `Try-on-from-anywhere, Doppl lets her upload a friend's outfit, a thrift-shop find, or an Instagram post and see it on herself; she is no longer constrained to one retailer's catalog`,\n        `AI-generated video of her in the look, not just static overlay (Doppl, Stitch Fix Vision)`,\n        `Try-on across her existing closet, visualizing new items styled with what she already owns`,\n        `RTR's stated 2026 roadmap: PDPs with \"visual versatility, including seeing the item in motion and in her size\"`\n      ]},\n      {code:\"2d\", name:\"AI stylist as ongoing relationship\", items:[\n        `Proactive curation between sessions, not just within them (Stitch Fix is shipping this)`,\n        `Hybrid AI + human stylist model, Stitch Fix Connect lets clients chat with stylists outside of a Fix; the human is the VIP layer the AI surfaces to`,\n        `Closet intelligence, what she owns, what's underused, what would complete a look`,\n        `Restyling existing pieces (\"wear it differently\"), not just selling new ones, the counterintuitive retention move`,\n        `Family / household stylist (Stitch Fix Family Accounts) and life-stage fit (GLP-1, pregnancy, recovery, fitness journey)`\n      ]},\n      {code:\"2e\", name:\"Social-signal-driven personalization\", items:[\n        `TikTok Shop's algorithm predicting purchase intent before she searches, projected 3–5x industry-average conversion by end of 2026`,\n        `Creator-graph and friend-graph signals shaping what she sees`,\n        `Cultural-moment-to-product latency compressed from weeks to minutes`,\n        `AI-generated shoppable video and live shopping at scale (TikTok AI Fashion Video Maker, Jan 2026)`,\n        `Context- and mood-aware personalization, inferring intent from browsing tempo, comment sentiment, and dwell signals beyond explicit search`\n      ]}\n    ]\n  },\n\n  q3:{\n    code:\"Q3\", col:\"Current\", row:\"Retailer engagement\", tag:\"Retailer-facing · Current\",\n    title:\"What they're already building\",\n    blurb:`The customer-facing functions inside the retailer where AI has already taken root: insights, CX, merchandising, marketing, brand, and innovation. Maturity varies widely; the leaders are years ahead of the field.`,\n    subs:[\n      {code:\"3a\", name:\"Consumer insights & Voice of Customer\", items:[\n        `NLP analysis of reviews, returns notes, support tickets, and social`,\n        `Trend monitoring and cultural-signal ingestion (search, social, runway, creator content)`,\n        `Needs-based segmentation (\"jobs to be done\") and aspiration profiling`,\n        `Competitive benchmarking on pricing, assortment, and promotional activity`\n      ]},\n      {code:\"3b\", name:\"Search, discovery & curation\", items:[\n        `ML recommendation engines (collaborative filtering, content-based, hybrid)`,\n        `NLP-powered semantic search, RTR's Feb 2026 launch delivered +10% subscription conversion`,\n        `Outfit curation and \"complete the look\" engines built from item-attribute embeddings`,\n        `Aesthetic-led, curated collections surfaced algorithmically`,\n        `AI-curated purchase destinations as core-business adjacencies, RTR Marketplace pilot (March 2026) launching curated essentials to drive attach rate; 86% of subscribers expressed interest in complementary purchases`\n      ]},\n      {code:\"3c\", name:\"PDP enrichment & visual versatility\", items:[\n        `AI-enriched PDPs, auto-generated descriptions, occasion tags, style notes, attribute tagging`,\n        `\"View on different models, sizes, and in motion\", RTR's stated 2026 roadmap; emerging as expected`,\n        `Outfit groupings displayed on individual PDPs to lift order size`,\n        `AI-generated product video and item-in-motion content at scale, replacing studio video for the long tail of SKUs`,\n        `AI-summarized reviews and Q&A surfaced above the fold`\n      ]},\n      {code:\"3d\", name:\"Personalization & CRM\", items:[\n        `Personalized email, push, and in-app messaging (Dynamic Yield, Bloomreach, Movable Ink class of tools)`,\n        `Personalized homepages and PDP modules tuned to behavioral signals`,\n        `Lifecycle messaging and triggered campaigns (welcome, win-back, replenishment)`,\n        `Churn prediction and retention triggering at the subscriber level`,\n        `AI-personalized loyalty and rewards, tiered programs adapted to individual behavior (RTR's tiered rewards system as a concrete example)`\n      ]},\n      {code:\"3e\", name:\"Brand, marketing & content production\", items:[\n        `Generative content for marketing creative, ad variants, lifestyle imagery, copy testing at scale`,\n        `Computer vision for product attribute tagging and visual similarity`,\n        `Performance creative testing across audience segments`,\n        `Influencer matching, creator program analytics, and ROI attribution`,\n        `TikTok AI Fashion Video Maker turning product images into shoppable video with AI voice and lip-sync`\n      ]},\n      {code:\"3f\", name:\"Fit, sizing & virtual try-on\", items:[\n        `Size/fit recommendation engines (True Fit, Fit Analytics, Bold Metrics, and proprietary models)`,\n        `Retailer-hosted virtual try-on, Walmart Be Your Own Model, L'Agence + Google partnership for Fall 2026, Zalando, Zara, ASOS Virtual Catwalk`,\n        `Returns-driven feedback loops continuously improving the fit model`\n      ]},\n      {code:\"3g\", name:\"CX & service\", items:[\n        `Chatbots for routine customer-service issues`,\n        `Friction and drop-off analysis along the subscriber journey`,\n        `Proactive service triggers (\"your shipment is delayed\") that turn detractor moments into loyalty moments`,\n        `AI-augmented agents for human service teams (summarization, suggested replies, knowledge surfacing)`,\n        `AI handling the long tail of routine CS so human teams can be reserved for the VIP / high-LTV layer (Klarna's explicit model)`\n      ]},\n      {code:\"3h\", name:\"Answer Engine Optimization (early)\", items:[\n        `Structuring product content so it gets cited and surfaced by ChatGPT, Perplexity, Gemini, and Alexa for Shopping`,\n        `RTR named AEO explicitly in its Q4 2025 / FY26 plan; many apparel retailers haven't yet`,\n        `The new SEO, with very different rules, structured-data requirements, and feedback signals`\n      ]}\n    ]\n  },\n\n  q4:{\n    code:\"Q4\", col:\"Future / emerging\", row:\"Retailer engagement\", tag:\"Retailer-facing · Future / emerging\",\n    title:\"Where they need to go\",\n    blurb:`The most strategically important quadrant. The customer's side (Q2) is racing ahead of retailer readiness. The retailers that survive the next three years recognize that being readable, rankable, and recommendable by her agent is the new commercial discipline.`,\n    subs:[\n      {code:\"4a\", name:\"Agent-readiness & agentic commerce infrastructure\", items:[\n        `Two open protocols emerging: ACP (OpenAI / Stripe; powers ChatGPT Instant Checkout) and UCP (Google / Shopify; covers the full discovery-through-fulfillment journey)`,\n        `ACP adopters: Etsy, Glossier, SKIMS, Spanx, Vuori, Target; JD Sports is the first enterprise apparel retailer on Stripe's Agentic Commerce Suite`,\n        `PayPal's ACP server bringing tens of millions of additional small businesses into ChatGPT commerce in 2026`,\n        `Amazon has taken the opposite path: blocked ChatGPT crawlers, built proprietary (Alexa for Shopping, Buy for Me)`,\n        `Structured, certified product metadata (Schema.org markup, real-time price / availability APIs) for agent consumption`,\n        `Agent payments infrastructure, Stripe Shared Payment Tokens (ACP), Google's Agent Payments Protocol (AP2) with Adyen`,\n        `Agent SEO replacing keyword SEO as the discoverability discipline`,\n        `The strategic fork: sell through her agent (ACP / UCP), build your own agent (Amazon model), or both`\n      ]},\n      {code:\"4b\", name:\"AI stylist as retailer platform\", items:[\n        `Retailer-hosted styling agent as the relationship layer, not just a rec engine, but the new homepage`,\n        `Stylist that spans her closet plus retailer inventory, the most defensible moat a retailer can build on first-party data`,\n        `Hybrid AI + human stylist model at scale (Stitch Fix Vision plus Stylist Connect is the template)`,\n        `For rental and resale: a stylist that proactively builds the next queue from her body, her calendar, and her returns history`,\n        `Stitch Fix data point: clients using Vision generated 100%+ lift in Freestyle purchases over 90 days`\n      ]},\n      {code:\"4c\", name:\"Autonomous merchandising & assortment\", items:[\n        `Real-time trend-to-buy loops compressing response from 6 months to 6 weeks`,\n        `Autonomous markdown, exit, and depth decisions with humans in the loop on strategic calls only`,\n        `Brand portfolio scoring and contract renegotiation informed by ML, the buyer becomes the editor of the AI's recommendations`,\n        `Direct integration between VOC signal (Q3a) and the buying calendar`\n      ]},\n      {code:\"4d\", name:\"Generative content & on-model imagery at scale\", items:[\n        `Every item on every body type, every occasion, every setting, without photo shoots, in real time based on consumer input and feedback`,\n        `Hyper-personalized PDPs generated per customer with imagery, copy, and styling notes tuned to her`,\n        `AI-generated shoppable video at retailer scale (the TikTok AI Fashion Video Maker pattern, extended)`,\n        `Synthetic models for inclusive representation across body types, ages, and ethnicities`,\n        `Real-time creative variant generation by segment and channel, collapsing the studio-to-store cycle`\n      ]},\n      {code:\"4e\", name:\"Hyper-personalized storefronts\", items:[\n        `Not \"personalized rec rows\", fundamentally different stores generated on the fly per customer`,\n        `Aesthetic-led navigation that adapts to her style identity rather than a fixed category tree`,\n        `Personalized pricing and offers where legally permitted`,\n        `Hyper-personalized merchandising as the answer to \"the grid is dead\", explicitly the framing RTR used in its Q4 2025 earnings`\n      ]},\n      {code:\"4f\", name:\"Continuous VOC & decision intelligence\", items:[\n        `Always-on listening across reviews, social, support, returns, and agent-interaction logs`,\n        `Insight feeding directly into buying, pricing, and product-roadmap decisions, not into a quarterly slide deck`,\n        `VOC as the input to autonomous merchandising and assortment loops (Q4c)`,\n        `The \"foundational listening system\" that most apparel retailers, including RTR, do not yet have`\n      ]},\n      {code:\"4g\", name:\"Generative fit & life-stage intelligence\", items:[\n        `Synthetic body modeling from photos and video, a true digital twin she carries with her`,\n        `Closed-loop fit data: what she returned, why, and what it actually looked like on her body`,\n        `Body-evolution intelligence, life stage, GLP-1, fitness, pregnancy, reshaping recommendations over time (Stitch Fix is openly tracking this)`,\n        `Fit profile portable across apparel brands via her agent, her digital twin travels, not the retailer's sizing data`\n      ]},\n      {code:\"4h\", name:\"Operational AI behind the experience\", items:[\n        `Computer vision for inventory salvage and condition assessment (RTR Q4 2025: keeping more units in peak rotation)`,\n        `Predictive service that resolves friction before the subscriber notices it`,\n        `Authenticity verification at returns, critical for rental and resale where counterfeit-substitution is a growing risk`,\n        `Operational excellence as the substrate that makes the customer-facing experience possible`\n      ]}\n    ],\n    nr:{\n      title:\"AI-native new revenue streams\",\n      note:`Sub-themes 4a–4h apply AI to the existing P&L, conversion, retention, cost-out. The six below are different in kind: each is a net-new revenue line where AI is the product she pays for, not the delivery mechanism. The test is strict, remove the AI and the offer collapses.`,\n      items:[\n        {code:\"4i\", name:\"Closet Twin\", desc:\"Paid wardrobe agent\", demo:true,\n         summary:`A subscription AI agent that builds a structured digital twin of everything she owns and orchestrates her wardrobe across rental, resale, and purchase decisions.`,\n         items:[\n           `Subscriber uploads or auto-imports her existing closet (photos, receipts, retailer integrations); the agent constructs a tagged, embedded inventory of every garment she owns`,\n           `Cross-references that closet against her calendar, body model, rental history, and weather/occasion context to recommend proactively: rent this, wear what you own, sell that, buy this for everyday`,\n           `Sits on top of RTR's subscription, Reserve, and marketplace, recommending the right venue (rent vs. buy vs. resell) for each garment decision`,\n           `Restyling layer: \"you already own three things that work for Tuesday, here's the outfit\", the counterintuitive retention move worth more than styling-for-purchase`,\n           `Closest analogues: Stitch Fix Vision and Stylist Connect, but neither covers her full closet across retailers`\n         ],\n         why:`Building a structured digital twin of a real woman's 200-plus-item closet, attribute tags, fit data, wear history, occasion suitability, is not feasible with human stylists at any consumer price point. What she pays for is the always-on inference across thousands of micro-decisions. No AI = a manual spreadsheet she would not maintain.`,\n         revenue:`Premium subscription tier (or standalone) layered on the existing rental tiers, benchmarked against premium concierge services. RTR's highest-LTV cohorts are the early target; attaches naturally into rental, Reserve, and marketplace upsell, direct subscription revenue plus incremental GMV.`,\n         rtw:`RTR has closed-loop wear, return, and fit data on hundreds of thousands of garments, arguably better fuel than Stitch Fix's purchase-and-keep data, because RTR sees what she actually wore versus rejected. Marketplace, Reserve, and subscription form a three-venue execution layer no pure-software competitor has.`\n        },\n        {code:\"4j\", name:\"Authenticity-as-a-Service\", desc:\"CV authentication API\",\n         summary:`License RTR's computer-vision authentication and provenance ledger to the rest of the pre-owned luxury market as an API.`,\n         items:[\n           `The pre-owned luxury market, handbags, watches, designer apparel, has a multi-billion-dollar counterfeit problem that The RealReal and Vestiaire Collective spend heavily on human authenticators to manage`,\n           `RTR's move into designer handbags, plus high-volume intake/return scanning, will produce one of the largest first-party CV corpora of authentic designer goods actually in circulation`,\n           `Sell that capability as an API to other resale platforms, consignment shops, insurers, and brand IP-protection teams`,\n           `Adjacent revenue: provenance-ledger services, a verified chain-of-custody record per item, useful for insurance underwriting and grey-market enforcement`,\n           `Margin profile is software, not retail, and the demand side is structurally underserved`\n         ],\n         why:`Human authenticators are scarce, expensive (~$80K–$120K loaded), and inconsistent. CV authentication trained on a large ground-truth corpus is the only way to scale to the throughput the market needs. The model is the product; no AI = the service does not exist.`,\n         revenue:`Per-authentication API fees with enterprise contracts for high-volume customers (resale platforms, insurers). Tiered by item category and confidence threshold. Optional bundled provenance ledger as a higher-margin SaaS layer.`,\n         rtw:`The designer-handbag push is, conveniently, the highest-counterfeit category in resale, so the data RTR is about to accumulate is the most commercially valuable training data in the space. No other apparel retailer is positioned to build this corpus.`\n        },\n        {code:\"4k\", name:\"Style DNA\", desc:\"Portable identity, sold to brands\",\n         summary:`Turn the subscriber's opted-in style profile into a privacy-preserving, AI-structured intent signal that brand partners pay to access, the higher-margin evolution of the Muse media business.`,\n         items:[\n           `Each opted-in subscriber has a \"style passport\": fit, color preference, occasion mix, brand affinity, life-stage signals, and evolution over time`,\n           `Brand partners pay for access to AI-inferred segments and intent signals, substantially higher quality than the cookie-based panels and survey data they buy today`,\n           `Sits alongside Muse and the existing advertising business, moving the offering up the value stack from impressions to AI-structured intent`,\n           `Privacy by design: subscribers see and control what is shared; share-of-data becomes the basis of an additional loyalty / value-back program`,\n           `Precedent: Stitch Fix and Pinterest have both monetized aesthetic-graph data with brand partners`\n         ],\n         why:`What's sold is not impressions or demographics, those are cheap. The product is an AI-inferred aesthetic and intent profile synthesizing wear behavior, returns, dwell time, restyle patterns, and life-stage signals into a representation no panel-based research can match. No AI = a generic media network with no signal advantage.`,\n         revenue:`B2B data and media revenue from brand partners: tiered subscriptions, custom segment licenses, performance-priced campaigns. Higher gross margin than rental and more scalable. Pairs with Muse as the premium intelligence layer underneath it.`,\n         rtw:`RTR's data is uniquely longitudinal, most retailers see a single purchase decision; RTR sees a subscriber try, wear, return, re-rent, and eventually buy across years. That signal density is the moat, and it's structured advertiser-side revenue, one of the three named growth bets.`\n        },\n        {code:\"4l\", name:\"Reserve AI Concierge\", desc:\"Occasion styling for Reserve\", todo:true,\n         summary:`An event-driven AI concierge that turns each Reserve booking into a complete, occasion-specific styling output, dress, shoes, bag, jewelry, even hair direction, at a price point human styling cannot reach.`,\n         items:[\n           `Reserve is the events-based, one-time rental business, every transaction has a specific occasion attached (wedding, gala, work event, vacation)`,\n           `Given a forwarded invite, calendar entry, or natural-language description, the concierge assembles three full looks accounting for venue, dress code, weather, who she has seen there before, and what she wore last time`,\n           `Pulls from her closet (via Closet Twin) plus Reserve inventory plus complementary marketplace items, so the output isn't just the dress, it's the whole evening`,\n           `Optional human stylist escalation for highest-tier bookings (the hybrid AI + human pattern Stitch Fix and Klarna have validated)`,\n           `Closest positioning: turning Reserve from a single-garment transaction into an end-to-end occasion experience`\n         ],\n         why:`Human stylists for individual occasions cost $500–$2,000 per session. That math does not work attached to a Reserve transaction averaging a couple hundred dollars. AI is the only way to deliver bespoke occasion styling at the price point rental economics can absorb. No AI = Reserve stays a transactional rental.`,\n         revenue:`Direct: a per-occasion styling fee bundled into Reserve, or a premium concierge subscription. Indirect but larger: lift in Reserve attach rate, AOV, and re-booking, converting a one-time rental into planned, repeat behavior. Maps to the Reserve growth bet.`,\n         rtw:`Reserve is one of the three named growth bets, and the occasion-anchored structure is unusually well-suited to AI styling. The data asset, what she wore to similar occasions, what fit, what she kept, is something no general-purpose styling agent will have.`\n        },\n        {code:\"4m\", name:\"B2B Fleet Wardrobe Manager\", desc:\"Uniform lifecycle, sold to hospitality\",\n         summary:`An AI-powered uniform and garment-lifecycle product sold to hotels, hospitality groups, airlines, and corporate concierge teams, built on the same buyer relationship as B2B dry cleaning.`,\n         items:[\n           `B2B dry cleaning gives RTR a foothold with hotels, hospitality, corporate concierge, and potentially airlines and cruise lines, buyers managing thousands to tens of thousands of garments`,\n           `Layer an AI fleet-management product on top: predicts when each garment needs replacement, optimizes rotation, flags theft and loss, surfaces the right SKUs to reorder, models cost per wear`,\n           `For premium hospitality, an executive concierge product helping the hotel deliver garment recommendations to its guests using the same engine`,\n           `Higher margin than the dry-cleaning service itself, sold to the same buyer with the same sales motion`,\n           `Comparable plays (Cintas, UniFirst) have not yet built an AI-native layer of this kind`\n         ],\n         why:`Uniform fleet management today is a clipboard problem solved with poorly maintained spreadsheets and reactive replacement. The value is continuous inference across thousands of items, predicting wear, theft, retirement, reorder timing, not feasible manually at scale. No AI = a slightly fancier dry-cleaning invoice.`,\n         revenue:`B2B SaaS subscription per fleet, priced by garment or seat count, attached to the dry-cleaning contract. Optional usage-based pricing for predictive replacement. Pure software margins on top of an existing operational relationship.`,\n         rtw:`B2B dry cleaning is one of the three named growth bets. The same buyer relationship and garment-condition CV stack RTR is building for its own operation can be productized for that buyer's fleet, acquisition cost essentially shared.`\n        },\n        {code:\"4n\", name:\"AI-underwritten Wear Confidence\", desc:\"Guarantee & insurance layer\",\n         summary:`A guarantee and insurance layer on rental and resale transactions, underwritten by per-garment CV condition assessment and wear history, pricing risk other players cannot.`,\n         items:[\n           `Products it enables: a \"guaranteed fit on first wear\" promise for Reserve; one-time wear-with-option-to-buy on designer handbags with damage coverage; a paid wardrobe-protection plan on marketplace purchases`,\n           `Underpinned by per-garment intake and return CV (already running per RTR Q4 2025) and per-item wear history (years of closed-loop data per garment)`,\n           `Risk-priced premiums on each transaction, incremental high-margin revenue per Reserve booking, per handbag rental, per marketplace sale`,\n           `Adjacent insurance-style products: extended-wear coverage on marketplace purchases, protection plans on retained items`,\n           `Conceptual precedent: warranty and protection-plan attach economics in consumer electronics, double-digit attach rates, gross margins above 50%`\n         ],\n         why:`Insurance pricing has historically been blunt because insurers cannot observe condition or wear at the item level. CV condition scoring plus per-item wear history is the only path to underwriting precise, per-transaction risk. The premium reflects the model's confidence, without it the actuarial risk is uneconomic.`,\n         revenue:`Premiums and attach fees on each Reserve, handbag, and marketplace transaction, pure margin layered on existing GMV. Optional standalone wardrobe-protection subscription as a higher tier.`,\n         rtw:`RTR is one of very few apparel companies with both the CV inspection infrastructure and the longitudinal per-item wear data to price this risk credibly. The designer-handbag push, high unit values, real damage exposure, is the obvious launch point.`\n        }\n      ]\n    }\n  }\n};\n<\u002Fscript>\n\n<script>\n(function(){\n  \"use strict\";\n  const deck = document.getElementById('deck');\n  const allPanels = Array.from(deck.querySelectorAll('.panel'));\n  let panels = allPanels.filter(p=>getComputedStyle(p).display!=='none');\n  const topbar = document.getElementById('topbar');\n  const pager = document.getElementById('pager');\n  const prog = document.getElementById('prog');\n  const navBtns = Array.from(document.querySelectorAll('#navlinks button'));\n  const prevBtn = document.getElementById('prev');\n  const nextBtn = document.getElementById('next');\n  let FRAME_INDEX = panels.findIndex(p=>p.id==='framework');\n  function rebuildPanels(){\n    panels = allPanels.filter(p=>getComputedStyle(p).display!=='none');\n    FRAME_INDEX = panels.findIndex(p=>p.id==='framework');\n  }\n\n  /* ---------------- helpers ---------------- */\n  const esc = s => String(s).replace(/&/g,'&amp;').replace(/<\u002Fg,'&lt;').replace(/>/g,'&gt;');\n  function ul(items){\n    return '<ul class=\"usecases\">'+items.map(i=>'<li>'+esc(i)+'<\u002Fli>').join('')+'<\u002Ful>';\n  }\n\n  /* ---------------- Framework state ---------------- */\n  const stage = document.getElementById('fwStage');\n  const crumb = document.getElementById('fwCrumb');\n  const tools = document.getElementById('fwTools');\n  let level = 1, curQ = null, curSub = null, layout = 'grid';\n\n  function setCrumb(html){ crumb.innerHTML = html; }\n  function paint(html){\n    stage.style.opacity = 0;\n    setTimeout(()=>{ stage.innerHTML = html; stage.scrollTop = 0; stage.style.opacity = 1; }, 120);\n  }\n\n  /* ----- Level 1: grid / stacked ----- */\n  function subChips(q, max){\n    const subs = FW[q].subs;\n    let chips = subs.slice(0, max).map(s=>'<li>'+esc(s.name)+'<\u002Fli>').join('');\n    const extra = subs.length - max;\n    let nr = (FW[q].nr) ? '<li class=\"more\">+ '+FW[q].nr.items.length+' new revenue ★<\u002Fli>' : '';\n    if(extra>0 && !FW[q].nr) chips += '<li class=\"more\">+'+extra+' more<\u002Fli>';\n    if(extra>0 && FW[q].nr) chips += '<li class=\"more\">+'+extra+'<\u002Fli>';\n    return chips + nr;\n  }\n\n  function quadList(q){\n    const d = FW[q];\n    const li = s => '<li><span class=\"qc\">'+esc(s.code)+'<\u002Fspan>'+esc(s.name)+(s.demo?' <span class=\"qdemo\">▶ demo<\u002Fspan>':'')+'<\u002Fli>';\n    let main = '<ul class=\"qsubs\">'+ d.subs.map(li).join('') +'<\u002Ful>';\n    let nr = '';\n    if(d.nr){\n      nr = '<div class=\"qsubs-nrlabel\"><span class=\"star\">★<\u002Fspan> '+esc(d.nr.title)+'<\u002Fdiv>'+\n           '<ul class=\"qsubs nr\">'+ d.nr.items.map(li).join('') +'<\u002Ful>';\n    }\n    return main + nr;\n  }\n\n  function quadCard(q){\n    const d = FW[q];\n    const isQ4 = q==='q4';\n    return '<button class=\"qcard '+(isQ4?'q4':'')+'\" data-q=\"'+q+'\">'+\n      '<div class=\"qcard-top\"><span class=\"qcard-q\">'+d.code+'<span class=\"qcard-ctx\">'+esc(d.tag)+'<\u002Fspan><\u002Fspan><span class=\"qcard-go\">↗<\u002Fspan><\u002Fdiv>'+\n      '<h3>'+esc(d.title)+'<\u002Fh3>'+\n      quadList(q)+\n    '<\u002Fbutton>';\n  }\n\n  function renderL1(){\n    level = 1; curQ = null; curSub = null;\n    setCrumb('<span class=\"fw-eyebrow\">The 2×2 framework<\u002Fspan><span class=\"sep\">·<\u002Fspan><span>tap a quadrant to explore<\u002Fspan>');\n    tools.style.visibility = 'visible';\n\n    const grid =\n      '<div class=\"l1 '+(layout==='cards'?'cards':'')+'\">'+\n        '<div class=\"cards-axis\"><span>Current<\u002Fspan><span>Future / emerging<\u002Fspan><\u002Fdiv>'+\n        '<div class=\"l1-axis-top\">'+\n          '<div class=\"corner\"><\u002Fdiv>'+\n          '<div class=\"ax-col\"><span>Current<\u002Fspan><span class=\"ln\"><\u002Fspan><\u002Fdiv>'+\n          '<div class=\"ax-col\"><span>Future / emerging<\u002Fspan><span class=\"ln\"><\u002Fspan><\u002Fdiv>'+\n        '<\u002Fdiv>'+\n        '<div class=\"l1-body\">'+\n          '<div class=\"ax-row r1\"><span class=\"ln\"><\u002Fspan>Customer experience<span class=\"ln\"><\u002Fspan><\u002Fdiv>'+\n          quadCard('q1')+ quadCard('q2')+\n          '<div class=\"ax-row r2\"><span class=\"ln\"><\u002Fspan>Retailer engagement<span class=\"ln\"><\u002Fspan><\u002Fdiv>'+\n          quadCard('q3')+ quadCard('q4')+\n        '<\u002Fdiv>'+\n      '<\u002Fdiv>';\n    paint(grid);\n  }\n\n  /* ----- Level 2: a quadrant with inline accordions ----- */\n  function accItem(q, s, isNr){\n    const badge = isNr ? '<span class=\"acc-badge\">★ New revenue<\u002Fspan>' : '';\n    const demoChip = (isNr && s.demo) ? '<span class=\"demo-chip\">▶ Demo<\u002Fspan>' : '';\n    const head =\n      '<div class=\"acc-head\">'+\n        '<span class=\"acc-code\">'+esc(s.code)+'<\u002Fspan>'+\n        '<span class=\"acc-nm\">'+badge+esc(s.name)+(isNr&&s.desc?', '+esc(s.desc):'')+'<\u002Fspan>'+\n        demoChip+\n        '<span class=\"acc-chev\">›<\u002Fspan>'+\n      '<\u002Fdiv>';\n    let body;\n    if(isNr){\n      const demo = s.demo ?\n        '<div class=\"demo-launch\">'+\n          '<div class=\"dl-txt\"><strong>The Closet Twin demo, stylist in your pocket.<\u002Fstrong>'+\n          '<span>She has already uploaded her closet and profile. The demo shows her getting styling advice that blends text and visuals and points to specific RTR items.<\u002Fspan><\u002Fdiv>'+\n          '<a class=\"demo-btn\" data-demo href=\"#\"><span class=\"play\">▶<\u002Fspan> Open the Closet Twin demo<\u002Fa>'+\n        '<\u002Fdiv>'+\n        '<div class=\"todo-row\"><span class=\"todo\"><span class=\"tag\">To do<\u002Fspan> Real demo URL to be added once the demo build is confirmed<\u002Fspan><\u002Fdiv>' : '';\n      const todo = s.todo ?\n        '<div class=\"todo-row\"><span class=\"todo\"><span class=\"tag\">To do<\u002Fspan> Possible second demo link here, Reserve AI Concierge, if the demo covers it<\u002Fspan><\u002Fdiv>' : '';\n      body = '<p class=\"acc-summary\">'+esc(s.summary)+'<\u002Fp>'+ demo + todo + ul(s.items)+\n        '<div class=\"nr-blocks\">'+\n          '<div class=\"nr-block\"><h4>Why AI is critical<\u002Fh4><p>'+esc(s.why)+'<\u002Fp><\u002Fdiv>'+\n          '<div class=\"nr-block\"><h4>Revenue model<\u002Fh4><p>'+esc(s.revenue)+'<\u002Fp><\u002Fdiv>'+\n          '<div class=\"nr-block\"><h4>RTR right-to-win<\u002Fh4><p>'+esc(s.rtw)+'<\u002Fp><\u002Fdiv>'+\n        '<\u002Fdiv>';\n    } else {\n      body = ul(s.items);\n    }\n    return '<div class=\"acc-item'+(isNr?' nr':'')+'\">'+ head +\n      '<div class=\"acc-body\"><div class=\"acc-pad\">'+ body +'<\u002Fdiv><\u002Fdiv><\u002Fdiv>';\n  }\n\n  function renderL2(q){\n    level = 2; curQ = q; curSub = null;\n    const d = FW[q];\n    tools.style.visibility = 'hidden';\n    setCrumb(\n      '<button class=\"fw-back\" data-back=\"grid\"><span class=\"ar\">←<\u002Fspan> Full grid<\u002Fbutton>'+\n      '<span class=\"sep\">·<\u002Fspan><span class=\"cur\">'+d.code.replace('Q','Quadrant ')+' · '+esc(d.title)+'<\u002Fspan>'+\n      '<span class=\"sep\">·<\u002Fspan><span class=\"crumb-hint\">tap a row to expand<\u002Fspan>'\n    );\n\n    let items = d.subs.map(s=>accItem(q,s,false)).join('');\n    let nr = '';\n    if(d.nr){\n      nr = '<div class=\"nr-divider\"><span class=\"lbl\"><span class=\"star\">★<\u002Fspan> '+esc(d.nr.title)+'<\u002Fspan><span class=\"ln\"><\u002Fspan><\u002Fdiv>'+\n           '<p class=\"nr-note\">'+esc(d.nr.note)+'<\u002Fp>'+\n           '<div class=\"acc\">'+ d.nr.items.map(s=>accItem(q,s,true)).join('') +'<\u002Fdiv>';\n    }\n\n\n    const html =\n      '<div class=\"l2\">'+\n        '<div class=\"l2-head\">'+\n          '<div class=\"l2-tag\">'+esc(d.tag)+'<\u002Fdiv>'+\n          '<h2>'+esc(d.title)+'<\u002Fh2>'+\n          '<p class=\"blurb\">'+esc(d.blurb)+'<\u002Fp>'+\n        '<\u002Fdiv>'+\n        '<div class=\"l2-scroll\"><div class=\"acc\">'+ items +'<\u002Fdiv>'+ nr +'<\u002Fdiv>'+\n      '<\u002Fdiv>';\n    paint(html);\n  }\n  /* ---------------- Framework interactions ---------------- */\n  stage.addEventListener('click', e=>{\n    const demo = e.target.closest('[data-demo]');\n    if(demo){ e.preventDefault(); demo.classList.add('pending'); demo.innerHTML = '<span class=\"play\">▶<\u002Fspan> Demo link pending, URL to be added'; return; }\n    const head = e.target.closest('.acc-head');\n    if(head){ head.parentElement.classList.toggle('open'); return; }\n    const card = e.target.closest('[data-q]');\n    if(card && level===1){ renderL2(card.getAttribute('data-q')); return; }\n  });\n\n  document.getElementById('layoutToggle').addEventListener('click', e=>{\n    const b = e.target.closest('button[data-layout]'); if(!b) return;\n    layout = b.getAttribute('data-layout');\n    document.querySelectorAll('#layoutToggle button').forEach(x=>x.classList.toggle('on', x===b));\n    if(level===1) renderL1();\n  });\n\n  // Back / return controls live in the crumb (sibling of the stage)\n  crumb.addEventListener('click', e=>{\n    const back = e.target.closest('[data-back]');\n    if(!back) return;\n    back.getAttribute('data-back')==='grid' ? renderL1() : renderL2(curQ);\n  });\n\n  function frameworkBack(){\n    if(level===2) renderL1();\n  }\n\n  renderL1();\n\n  /* ---------------- Paging / scroll-snap ---------------- */\n  let current = 0;\n  function goTo(i){\n    i = Math.max(0, Math.min(panels.length-1, i));\n    deck.scrollTo({ top: panels[i].offsetTop, behavior:'smooth' });\n  }\n  function setActive(i){\n    if(i===current && panels[current].classList.contains('is-active')) return;\n    current = i;\n    panels.forEach((p,k)=>p.classList.toggle('is-active', k===i));\n    const p = panels[i];\n    const dark = p.classList.contains('panel--dark') || p.classList.contains('panel--char');\n    topbar.classList.toggle('on-dark', dark);\n    pager.classList.toggle('on-dark', dark);\n    const sec = p.getAttribute('data-section');\n    navBtns.forEach(b=>{\n      const t = +b.getAttribute('data-go');\n      const tsec = panels[t] ? panels[t].getAttribute('data-section') : '';\n      b.classList.toggle('active', tsec===sec);\n    });\n    prevBtn.disabled = (i===0);\n    nextBtn.disabled = (i===panels.length-1);\n  }\n\n  let ticking=false;\n  deck.addEventListener('scroll', ()=>{\n    if(ticking) return; ticking=true;\n    requestAnimationFrame(()=>{\n      const st = deck.scrollTop;\n      // progress\n      const max = deck.scrollHeight - deck.clientHeight;\n      prog.style.width = (max>0 ? (st/max*100) : 0)+'%';\n      // nearest panel\n      let best=0, bestD=Infinity;\n      panels.forEach((p,k)=>{ const d=Math.abs(p.offsetTop-st); if(d<bestD){bestD=d;best=k;} });\n      setActive(best);\n      ticking=false;\n    });\n  }, {passive:true});\n\n  prevBtn.addEventListener('click', ()=>goTo(current-1));\n  nextBtn.addEventListener('click', ()=>goTo(current+1));\n  navBtns.forEach(b=>b.addEventListener('click', ()=>goTo(+b.getAttribute('data-go'))));\n  document.querySelectorAll('[data-go]').forEach(el=>{\n    if(el.closest('#navlinks')) return;\n    el.addEventListener('click', ()=>goTo(+el.getAttribute('data-go')));\n  });\n\n  /* ---------------- Discussion view toggle ---------------- */\n  document.getElementById('discToggle').addEventListener('click', e=>{\n    const b = e.target.closest('button[data-disc]'); if(!b) return;\n    document.querySelectorAll('#discToggle button').forEach(x=>x.classList.toggle('on', x===b));\n    document.body.classList.toggle('disc-all', b.getAttribute('data-disc')==='all');\n    rebuildPanels();\n    const intro = allPanels.find(p=>p.classList.contains('disc-intro'));\n    const idx = panels.indexOf(intro);\n    current = -1; setActive(idx);\n    deck.scrollTo({ top: intro.offsetTop });\n  });\n\n  /* ---------------- Keyboard ---------------- */\n  const FWD = ['ArrowDown','ArrowRight','PageDown',' ','Spacebar'];\n  const BACK = ['ArrowUp','ArrowLeft','PageUp'];\n  window.addEventListener('keydown', e=>{\n    const inFramework = (current===FRAME_INDEX);\n    if(inFramework && level>1){\n      if(e.key==='Escape'){ e.preventDefault(); frameworkBack(); return; }\n      if(FWD.includes(e.key)||BACK.includes(e.key)){ e.preventDefault(); return; } // don't scroll away mid-exploration\n    }\n    if(e.key==='Escape' && inFramework && level>1){ e.preventDefault(); frameworkBack(); return; }\n    if(FWD.includes(e.key)){ e.preventDefault(); goTo(current+1); }\n    else if(BACK.includes(e.key)){ e.preventDefault(); goTo(current-1); }\n  });\n\n  /* init */\n  setActive(0);\n  window.addEventListener('load', ()=>setActive(0));\n})();\n<\u002Fscript>\n\n<!-- thumbnail for offline bundling -->\n\n\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
