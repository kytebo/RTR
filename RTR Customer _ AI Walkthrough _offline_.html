<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Rent the Runway · Customer &amp; AI Walkthrough</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #faf9f5; display: flex; align-items: center; justify-content: center; min-height: 100vh; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
    #__bundler_loading { position: fixed; bottom: 20px; right: 20px; font: 13px/1.4 -apple-system, BlinkMacSystemFont, sans-serif; color: #666; background: #fff; padding: 8px 14px; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.12); z-index: 10000; }
    #__bundler_thumbnail { position: fixed; inset: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: #faf9f5; z-index: 9999; }
    #__bundler_thumbnail svg { width: 100%; height: 100%; object-fit: contain; }
    #__bundler_placeholder { color: #999; font-size: 14px; }
  </style>
  <noscript>
    <style>#__bundler_loading { display: none; }</style>
    <div style="position:fixed;bottom:12px;left:12px;font:13px/1.4 -apple-system,BlinkMacSystemFont,sans-serif;color:#999;background:rgba(255,255,255,0.9);padding:6px 12px;border-radius:6px;box-shadow:0 1px 4px rgba(0,0,0,0.08);z-index:10000;">
      This page requires JavaScript to display.
    </div>
  </noscript>
</head>
<body>
  <div id="__bundler_thumbnail">
  <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <rect width="100" height="100" fill="#181934"></rect>
    <rect x="30" y="30" width="18" height="18" rx="3" fill="#EAE8DF"></rect>
    <rect x="52" y="30" width="18" height="18" rx="3" fill="#EAE8DF"></rect>
    <rect x="30" y="52" width="18" height="18" rx="3" fill="#EAE8DF"></rect>
    <rect x="52" y="52" width="18" height="18" rx="3" fill="#FF603A"></rect>
  </svg>
</div>
  <div id="__bundler_loading">Unpacking...</div>

  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);

    // ── Image slot injection ──────────────────────────────────────────────
    // Adds placeholder image slots to every observation slide and each
    // framework quadrant card. Replace the placeholder divs with <img> tags
    // (or swap src to a base64 / URL string) when you have final images.
    (function() {
      var s = document.createElement('style');
      s.textContent =
        '.panel.obs.has-image{position:relative;}' +
        '@media(min-width:761px){' +
          '.panel.obs.has-image .wrap{max-width:56%;}' +
          '.obs-media{position:absolute;right:clamp(1.5rem,5vw,3.5rem);top:50%;' +
            'transform:translateY(-50%);width:clamp(220px,28vw,380px);}' +
          '.obs-media img{width:100%;height:clamp(300px,42vh,460px);' +
            'object-fit:cover;border-radius:8px;display:block;}' +
        '}' +
        '@media(max-width:760px){.obs-media{display:none;}}' +
        '.qcard-img-slot{width:100%;height:130px;border-radius:5px;' +
          'margin-bottom:1rem;overflow:hidden;}' +
        '.qcard-img-slot img{width:100%;height:100%;object-fit:cover;display:block;}';
      document.head.appendChild(s);

      // Dashed placeholder shown until a real image is supplied.
      function ph(label, hint) {
        return '<div style="width:100%;height:100%;background:rgba(255,96,58,0.07);' +
          'border:2px dashed rgba(255,96,58,0.28);border-radius:8px;display:flex;' +
          'flex-direction:column;align-items:center;justify-content:center;' +
          'gap:0.5rem;padding:0.75rem;text-align:center;">' +
          '<svg width="32" height="32" viewBox="0 0 24 24" fill="none" ' +
            'stroke="rgba(255,96,58,0.45)" stroke-width="1.5">' +
            '<rect x="3" y="3" width="18" height="18" rx="2"/>' +
            '<circle cx="8.5" cy="8.5" r="1.5"/>' +
            '<path d="m21 15-5-5L5 21"/></svg>' +
          '<span style="font-size:9px;letter-spacing:0.07em;text-transform:uppercase;' +
            'color:rgba(255,96,58,0.55);line-height:1.3;">' + label + '</span>' +
          '<span style="font-size:8px;color:rgba(30,30,30,0.38);font-style:italic;">' +
            hint + '</span></div>';
      }

      // ── Observation slides (5 panels) ───────────────────────────────────
      // To swap in a real image, replace ph(...) with:
      //   '<img src="data:image/jpeg;base64,YOUR_BASE64" alt="...">'
      // or '<img src="images/obs-01.jpg" alt="...">'
      var obsImages = [
        'Images/vitaly-gariev-_4jRJ55AwhI-unsplash.jpg',
        'Images/pexels-polina-tankilevitch-6988653.jpg',
        'Images/the-blowup-Rmjq07KI20U-unsplash.jpg',
        'Images/vitaly-gariev-8uAQ1_tkJt4-unsplash.jpg',
        'Images/molly-mears-4_90zmmdo_4-unsplash.jpg',
      ];
      Array.from(document.querySelectorAll('.panel.obs')).forEach(function(p, i) {
        if (i >= obsImages.length) return;
        p.classList.add('has-image');
        var d = document.createElement('div');
        d.className = 'obs-media';
        d.innerHTML = '<img src="' + obsImages[i] + '" alt="Observation ' + (i + 1) + '">';
        p.appendChild(d);
      });

      // ── Framework quadrant cards (Q1–Q4) ────────────────────────────────
      var qImages = [
        'Images/jon-ly-Xn7GvimQrk8-unsplash.jpg',
        'Images/pexels-darina-belonogova-8788681.jpg',
        'Images/pexels-ron-lach-8311902.jpg',
        'Images/kevin-laminto-07wBhL5WqgI-unsplash.jpg',
      ];
      var qOrder = ['q1','q2','q3','q4'];
      var lastQ = null;

      // Videos per quadrant: { title, embedUrl, short }
      var qVideos = {
        q1: [
          { title: 'Web shopping giant QVC finds new home on TikTok',
            url: 'https://www.youtube.com/embed/nHdrRUyJuSA', short: false },
          { title: 'Google AI\'s Virtual Try-On Shopping',
            url: 'https://www.youtube.com/embed/stp6it4reM0?start=54', short: false },
          { title: '5 AI Styling Apps Tried to Guess My Aesthetic',
            url: 'https://www.youtube.com/embed/UEaW5aAs-ds?start=807', short: false }
        ],
        q2: [
          { title: 'An updated shopping experience in ChatGPT',
            url: 'https://www.youtube.com/embed/qF4QRh2u7FE', short: false },
          { title: 'Amazon offers Alexa agent — FOX43',
            url: 'https://www.youtube.com/embed/kmDA_9UFE7o', short: true },
          { title: 'Google\'s Doppl App: Try-On Clothes with AI',
            url: 'https://www.youtube.com/embed/vWLVhJAn2Oo', short: false },
          { title: 'Agentic Commerce Explained: How AI Agents Will Change Shopping Forever',
            url: 'https://www.youtube.com/embed/M8QR-uaRKpo?start=75', short: false }
        ],
        q3: [
          { title: 'Zara Just Changed Shopping Forever',
            url: 'https://www.youtube.com/embed/JNDwflJNvz0', short: true },
          { title: 'Bloomreach\'s Game-Changing AI for Ecommerce Personalization',
            url: 'https://www.youtube.com/embed/BQLZFUhKpBc?start=120', short: false },
          { title: 'AI Customer Service: Klarna\'s Chatbot vs Humans',
            url: 'https://www.youtube.com/embed/94XLS2QIafw', short: true }
        ],
        q4: [
          { title: 'AI closet app promises to style your wardrobe in seconds',
            url: 'https://www.youtube.com/embed/1rNwRwT6590?start=15', short: false },
          { title: 'AI Generated On-Model Imagery | End to End Fashion eCommerce',
            url: 'https://www.youtube.com/embed/eK3UBQa4eyg', short: false },
          { title: 'Google\'s New Universal Commerce Protocol',
            url: 'https://www.youtube.com/embed/yDKpF6CjBUo?start=9', short: false }
        ]
      };

      // ── Video modal ────────────────────────────────────────────────
      var vidModal = null, vidIframe = null;

      function buildVidModal() {
        if (vidModal) return;
        vidModal = document.createElement('div');
        vidModal.className = 'vid-modal';
        vidModal.innerHTML =
          '<div class="vid-modal-box vid-modal-box--wide">' +
            '<button class="vid-modal-close" aria-label="Close">&#x2715;</button>' +
            '<div class="vid-modal-frame"><iframe class="vid-iframe" src="" frameborder="0" ' +
              'allow="accelerometer; autoplay; clipboard-write; encrypted-media; ' +
              'gyroscope; picture-in-picture" allowfullscreen></iframe></div>' +
            '<a class="vid-modal-link" href="" target="_blank" rel="noopener">' +
              'Trouble playing? Open on YouTube &#8599;</a>' +
          '</div>';
        document.body.appendChild(vidModal);
        vidIframe = vidModal.querySelector('.vid-iframe');
        vidModal.addEventListener('click', function(e) {
          if (e.target === vidModal) closeVidModal();
        });
        vidModal.querySelector('.vid-modal-close').addEventListener('click', closeVidModal);
        document.addEventListener('keydown', function(e) {
          if (e.key === 'Escape' && vidModal.classList.contains('vid-modal--open')) closeVidModal();
        });
      }

      // Build a youtube.com/watch URL (with timestamp) from an /embed URL,
      // for the "Open on YouTube" fallback when file:// embedding is blocked.
      function watchUrlFromEmbed(u) {
        var id = u.match(/embed\/([^?&\/]+)/);
        if (!id) return u;
        var t = u.match(/[?&]start=(\d+)/);
        return 'https://www.youtube.com/watch?v=' + id[1] + (t ? '&t=' + t[1] + 's' : '');
      }
      function openVidModal(url, isShort) {
        buildVidModal();
        var box = vidModal.querySelector('.vid-modal-box');
        box.className = 'vid-modal-box ' + (isShort ? 'vid-modal-box--short' : 'vid-modal-box--wide');
        // youtube-nocookie.com is more permissive about embed origin than the
        // main domain, which helps when the deck is opened directly from disk.
        var embed = url.replace('www.youtube.com/embed', 'www.youtube-nocookie.com/embed');
        var sep = embed.indexOf('?') >= 0 ? '&' : '?';
        vidIframe.src = embed + sep + 'autoplay=1&rel=0&modestbranding=1&playsinline=1';
        var link = vidModal.querySelector('.vid-modal-link');
        if (link) link.href = watchUrlFromEmbed(url);
        vidModal.classList.add('vid-modal--open');
      }

      function closeVidModal() {
        if (!vidModal) return;
        vidModal.classList.remove('vid-modal--open');
        vidIframe.src = '';
      }

      // ── Video buttons ──────────────────────────────────────────────
      function injectVideoButtons(el, q) {
        var videos = qVideos[q];
        if (!videos || !videos.length || el.querySelector('.vid-buttons')) return;
        var head = el.querySelector('.l2-head');
        if (!head) return;
        var bar = document.createElement('div');
        bar.className = 'vid-buttons';
        videos.forEach(function(v) {
          var btn = document.createElement('button');
          btn.className = 'vid-btn';
          btn.innerHTML = '<span class="vid-btn-icon">&#9654;</span><span>' + v.title + '</span>';
          btn.addEventListener('click', function() { openVidModal(v.url, v.short); });
          bar.appendChild(btn);
        });
        head.appendChild(bar);
      }

      // ── Q4 toggle tabs ─────────────────────────────────────────────
      function injectQ4Toggle(el) {
        if (el.querySelector('.q4-tabs')) return;
        var scroll = el.querySelector('.l2-scroll');
        if (!scroll) return;
        var accs = scroll.querySelectorAll('.acc');
        var nrDivider = scroll.querySelector('.nr-divider');
        var nrNote = scroll.querySelector('.nr-note');
        if (accs.length < 2 || !nrDivider) return;
        var primaryAcc = accs[0];
        var nrAcc = accs[accs.length - 1];
        var head = el.querySelector('.l2-head');
        if (!head) return;
        var tabs = document.createElement('div');
        tabs.className = 'q4-tabs';
        tabs.innerHTML =
          '<button class="q4-tab q4-tab--active" data-tab="primary">Core capabilities</button>' +
          '<button class="q4-tab" data-tab="nr">★ AI-native revenue</button>';
        head.appendChild(tabs);
        nrDivider.style.display = 'none';
        nrNote.style.display = 'none';
        nrAcc.style.display = 'none';
        tabs.addEventListener('click', function(e) {
          var btn = e.target.closest('.q4-tab');
          if (!btn) return;
          var showPrimary = btn.getAttribute('data-tab') === 'primary';
          Array.from(tabs.querySelectorAll('.q4-tab')).forEach(function(b) {
            b.classList.toggle('q4-tab--active', b === btn);
          });
          primaryAcc.style.display = showPrimary ? '' : 'none';
          nrDivider.style.display = showPrimary ? 'none' : '';
          nrNote.style.display = showPrimary ? 'none' : '';
          nrAcc.style.display = showPrimary ? 'none' : '';
        });
      }

      // ── L2 image + enhancements ────────────────────────────────────
      // Derive the quadrant straight from the rendered L2 (its tag reads
      // "{Customer|Retailer}-facing · {Current|Future / emerging}") so this
      // never depends on click-timing state the app re-render can drop.
      function detectQIdx(el) {
        var tagEl = el.querySelector('.l2-tag');
        var t = (tagEl && tagEl.textContent) || '';
        if (!t) return -1;
        return (/Retailer/i.test(t) ? 2 : 0) + (/Future/i.test(t) ? 1 : 0);
      }
      function injectL2Image(el) {
        if (el.querySelector('.l2-img')) return;
        var idx = detectQIdx(el);
        if (idx < 0 || idx >= qImages.length) return;
        var q = qOrder[idx];
        var col = document.createElement('div');
        col.className = 'l2-content';
        while (el.firstChild) col.appendChild(el.firstChild);
        el.appendChild(col);
        var imgDiv = document.createElement('div');
        imgDiv.className = 'l2-img';
        imgDiv.innerHTML = '<img src="' + qImages[idx] + '" alt="">';
        el.appendChild(imgDiv);
        injectVideoButtons(el, q);
        if (q === 'q4') injectQ4Toggle(el);
      }

      // ── Grid card thumbnails ───────────────────────────────────────
      function injectQCards() {
        Array.from(document.querySelectorAll('.qcard:not([data-img-done])')).forEach(function(c, i) {
          if (i >= qImages.length) return;
          c.setAttribute('data-img-done', '1');
          var sl = document.createElement('div');
          sl.className = 'qcard-img-slot';
          sl.innerHTML = '<img src="' + qImages[i] + '" alt="Quadrant ' + (i + 1) + '">';
          c.prepend(sl);
        });
      }

      // ── Styles ────────────────────────────────────────────────────
      var l2Style = document.createElement('style');
      l2Style.textContent =
        // L2 two-column layout
        '.l2{flex-direction:row!important;gap:2rem;align-items:stretch;}' +
        '.l2-content{flex:1 1 auto;display:flex;flex-direction:column;min-height:0;overflow:hidden;}' +
        '.l2-content .l2-scroll{flex:1 1 auto;min-height:0;overflow-y:auto;}' +
        '.l2-img{flex:0 0 clamp(220px,30%,400px);align-self:stretch;}' +
        '.l2-img img{width:100%;height:100%;object-fit:cover;border-radius:12px;display:block;}' +
        '@media(max-width:760px){.l2{flex-direction:column!important;}.l2-img{flex:0 0 180px;}}' +
        // Q4 tabs
        '.q4-tabs{display:flex;gap:8px;margin-top:16px;flex-wrap:wrap;}' +
        '.q4-tab{padding:6px 18px;border:1px solid rgba(30,30,30,0.15);border-radius:20px;' +
          'background:none;font-size:13px;font-family:inherit;cursor:pointer;' +
          'color:rgba(30,30,30,0.5);transition:background 150ms,color 150ms,border-color 150ms;}' +
        '.q4-tab:hover{border-color:rgba(30,30,30,0.35);color:rgba(30,30,30,0.8);}' +
        '.q4-tab--active{background:#FF603A;border-color:#FF603A;color:#fff;}' +
        '.q4-tab--active:hover{background:#e0522e;border-color:#e0522e;color:#fff;}' +
        // Video buttons
        '.vid-buttons{display:flex;flex-direction:column;gap:7px;margin-top:16px;}' +
        '.vid-btn{display:flex;align-items:center;gap:9px;padding:8px 14px;' +
          'background:none;border:1px solid rgba(30,30,30,0.15);border-radius:8px;' +
          'font-size:13px;font-family:inherit;cursor:pointer;text-align:left;' +
          'color:rgba(30,30,30,0.65);transition:border-color 150ms,color 150ms;}' +
        '.vid-btn:hover{border-color:#FF603A;color:#FF603A;}' +
        '.vid-btn-icon{flex:0 0 auto;width:22px;height:22px;border-radius:50%;' +
          'background:#FF603A;color:#fff;display:flex;align-items:center;' +
          'justify-content:center;font-size:9px;padding-left:2px;}' +
        // Video modal
        '.vid-modal{position:fixed;inset:0;z-index:9000;background:rgba(0,0,0,0.8);' +
          'display:flex;align-items:center;justify-content:center;' +
          'opacity:0;pointer-events:none;transition:opacity 200ms;}' +
        '.vid-modal--open{opacity:1;pointer-events:auto;}' +
        '.vid-modal-box{position:relative;background:#000;border-radius:12px;overflow:hidden;}' +
        '.vid-modal-box--wide{width:min(900px,90vw);}' +
        '.vid-modal-box--short{width:min(380px,90vw);}' +
        '.vid-modal-frame{position:relative;height:0;}' +
        '.vid-modal-box--wide .vid-modal-frame{padding-bottom:56.25%;}' +
        '.vid-modal-box--short .vid-modal-frame{padding-bottom:177.78%;}' +
        '.vid-iframe{position:absolute;inset:0;width:100%;height:100%;border:0;}' +
        '.vid-modal-close{position:absolute;top:10px;right:10px;z-index:2;' +
          'width:32px;height:32px;border-radius:50%;border:none;' +
          'background:rgba(0,0,0,0.55);color:#fff;font-size:16px;' +
          'cursor:pointer;display:flex;align-items:center;justify-content:center;' +
          'transition:background 150ms;}' +
        '.vid-modal-close:hover{background:rgba(0,0,0,0.85);}' +
        '.vid-modal-link{display:block;text-align:center;padding:9px;' +
          'background:rgba(0,0,0,0.55);color:rgba(255,255,255,0.82);' +
          'font-size:12px;text-decoration:none;letter-spacing:.02em;' +
          'transition:color 150ms;}' +
        '.vid-modal-link:hover{color:#fff;}';
      document.head.appendChild(l2Style);

      // ── Persistent observer ────────────────────────────────────────
      var qObs = new MutationObserver(function(mutations) {
        injectQCards();
        mutations.forEach(function(m) {
          m.addedNodes.forEach(function(n) {
            if (n.nodeType !== 1) return;
            if (n.classList && n.classList.contains('l2')) injectL2Image(n);
            var l2 = n.querySelector && n.querySelector('.l2');
            if (l2) injectL2Image(l2);
          });
        });
      });
      qObs.observe(document.body || document.documentElement, { childList: true, subtree: true });
      injectQCards();
